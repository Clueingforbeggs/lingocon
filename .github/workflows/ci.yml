name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Prisma client must be generated before tsc — types are imported widely.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      # Non-blocking for now: the outstanding advisories are in Next.js and
      # require the deliberate framework upgrade. Surfaces new high/critical CVEs
      # without failing the build. Tighten to a blocking gate once Next is bumped.
      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true
